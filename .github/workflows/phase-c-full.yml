name: Phase C — Full Integration (Scan + Verify + Jest-Sharded)

on:
  push:
    branches: [feature/phase-c*, master]
  pull_request:
    branches: [feature/phase-c*, master]
  schedule:
    - cron: '0 2 * * *'  # Nightly (02:00 UTC)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ═══════════════════════════════════════════════════════════════════
  # Phase 1: Fast Checks (Early-Fail)
  # ═══════════════════════════════════════════════════════════════════
  scan-and-verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    outputs:
      scan-status: ${{ steps.scan.outcome }}
      verify-status: ${{ steps.verify.outcome }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build bootstrap.js
        run: npm run build
        timeout-minutes: 5

      - name: Generate stage1.js
        run: bash scripts/build-stage1.sh
        timeout-minutes: 10

      - name: "🔍 FL-Token Scan (Early-Fail)"
        id: scan
        run: bash scripts/scan-for-fl-tokens.sh stage1.js
        continue-on-error: false

      - name: "🔗 Fixed-Point Verification (5-stage SHA)"
        id: verify
        run: |
          bash scripts/verify-fixed-point.sh
        continue-on-error: true

      - name: "🧪 Let-in-Expression Regression"
        id: regression
        run: node scripts/check-let-regressions.js
        continue-on-error: true

      - name: "📦 Upload artifacts (on scan/verify failure)"
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: scan-verify-artifacts
          path: |
            stage1.js
            stage2.js
            stage3.js
            /tmp/build.log
          retention-days: 7

      - name: "✅ Summary (Scan & Verify)"
        run: |
          echo "## 🔍 Scan & Verify Results"
          echo ""
          echo "- FL-Token Scan: ${{ steps.scan.outcome }}"
          echo "- Fixed-Point: ${{ steps.verify.outcome }}"
          echo "- Regression: ${{ steps.regression.outcome }}"

  # ═══════════════════════════════════════════════════════════════════
  # Phase 2: Regression Tests (Fast)
  # ═══════════════════════════════════════════════════════════════════
  regression-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: scan-and-verify
    if: ${{ needs.scan-and-verify.outputs.scan-status == 'success' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: "🧪 Jest Regression Tests (Codegen + Let)"
        run: npm test -- src/__tests__/codegen.let.test.ts --silent
        timeout-minutes: 5

      - name: "✅ Regression Tests PASS"
        if: success()
        run: echo "✅ All regression tests passed"

  # ═══════════════════════════════════════════════════════════════════
  # Phase 3: Full Jest (Matrix/Sharded)
  # ═══════════════════════════════════════════════════════════════════
  jest-full:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: scan-and-verify
    if: ${{ needs.scan-and-verify.outputs.scan-status == 'success' }}

    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]  # 3개 shard로 병렬화 (각 ~200 tests)

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: "📊 Jest Shard ${{ matrix.shard }}/3"
        run: |
          npm test -- \
            --shard=${{ matrix.shard }}/3 \
            --bail=false \
            --silent \
            --maxWorkers=4
        timeout-minutes: 30
        continue-on-error: true

      - name: "📦 Upload Jest Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jest-results-shard-${{ matrix.shard }}
          path: |
            coverage/
            junit.xml
          retention-days: 7

  # ═══════════════════════════════════════════════════════════════════
  # Phase 4: Final Summary & Checks
  # ═══════════════════════════════════════════════════════════════════
  summary:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [scan-and-verify, regression-tests, jest-full]
    if: always()

    steps:
      - name: Download artifacts (summary)
        uses: actions/download-artifact@v4
        continue-on-error: true

      - name: "📊 Build Summary"
        run: |
          echo "## 🎯 Phase C — Full Integration Summary"
          echo ""
          echo "### ✅ Scan & Verify"
          echo "- Status: ${{ needs.scan-and-verify.result }}"
          echo ""
          echo "### 🧪 Regression Tests"
          echo "- Status: ${{ needs.regression-tests.result }}"
          echo ""
          echo "### 📝 Full Jest (3 Shards)"
          echo "- Status: ${{ needs.jest-full.result }}"
          echo ""
          echo "---"
          echo ""
          if [ "${{ needs.scan-and-verify.result }}" == "success" ] && \
             [ "${{ needs.regression-tests.result }}" == "success" ] && \
             [ "${{ needs.jest-full.result }}" == "success" ]; then
            echo "✨ **All checks PASSED**"
          else
            echo "❌ **Some checks FAILED** — Review logs above"
          fi

      - name: "🚨 Notify on Failure (Optional)"
        if: failure()
        run: |
          echo "### ⚠️ CI Pipeline Failed"
          echo "Review artifacts and logs for details:"
          echo "- scan-verify-artifacts/"
          echo "- jest-results-shard-*/"

  # ═══════════════════════════════════════════════════════════════════
  # Nightly: Full Self-Hosting Chain (Optional)
  # ═══════════════════════════════════════════════════════════════════
  nightly-self-host:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'schedule'

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --prefer-offline

      - name: Build & Full Self-Hosting Chain
        run: |
          bash scripts/build-stage1.sh
          bash scripts/verify-fixed-point.sh
          npm test -- --silent

      - name: "✅ Nightly Self-Hosting Complete"
        if: success()
        run: echo "✅ Nightly full chain verification passed"

      - name: "📦 Archive Nightly Results"
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-results-${{ github.run_id }}
          path: |
            stage1.js
            stage2.js
            stage3.js
          retention-days: 30
