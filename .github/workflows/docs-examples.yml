name: Docs Examples Validation

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  validate-examples:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Extract FL examples from CLAUDE.md & README.md
        run: |
          node scripts/extract-fl-examples.js CLAUDE.md README.md > /tmp/examples.fl || true
          echo "Extracted $(wc -l < /tmp/examples.fl) lines"
          head -40 /tmp/examples.fl

      - name: Validate examples (parser check)
        run: |
          if [ -s /tmp/examples.fl ]; then
            node bootstrap.js check /tmp/examples.fl || {
              echo "::error::문서 예제가 파서 검증에 실패했습니다. CLAUDE.md / README.md 의 코드 블록을 점검하세요."
              exit 1
            }
          else
            echo "No FL examples found in docs; skipping."
          fi
