# /etc/nginx/sites-available/auth.dclub.kr
#
# dclub-auth 프로덕션 리버스 프록시.
# /opt/dclub-auth 의 서비스가 127.0.0.1:30100 에서 listen,
# 이 nginx가 TLS 종료 + 외부 노출.
#
# 설치:
#   sudo cp nginx-auth.dclub.kr.conf /etc/nginx/sites-available/auth.dclub.kr
#   sudo ln -s /etc/nginx/sites-available/auth.dclub.kr /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d auth.dclub.kr
#   sudo nginx -t && sudo systemctl reload nginx

# Rate limit zones (글로벌 — http 블록에 정의돼 있어야 함)
# /etc/nginx/nginx.conf 의 http {} 안에 추가:
#   limit_req_zone $binary_remote_addr zone=auth_login:10m rate=10r/s;
#   limit_req_zone $binary_remote_addr zone=auth_api:10m rate=30r/s;

server {
    listen 80;
    listen [::]:80;
    server_name auth.dclub.kr;

    # ACME challenge 만 80 허용, 나머지는 HTTPS 강제
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name auth.dclub.kr;

    # TLS — certbot 이 작성/갱신
    ssl_certificate     /etc/letsencrypt/live/auth.dclub.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/auth.dclub.kr/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # HSTS — 1년, 서브도메인 포함
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header X-XSS-Protection "0" always;

    # 본문 크기 제한 (보통 인증 흐름은 작은 폼)
    client_max_body_size 64k;

    # ── 정적: JWKS 1시간 CDN 캐시 ──────────────────────
    location = /jwks.json {
        proxy_pass http://127.0.0.1:30100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── 정적: discovery 1시간 CDN 캐시 ─────────────────
    location = /.well-known/openid-configuration {
        proxy_pass http://127.0.0.1:30100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── /login: rate limit (계정 brute-force 방어 추가 1차) ─
    location = /login {
        limit_req zone=auth_login burst=5 nodelay;
        proxy_pass http://127.0.0.1:30100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── /token + /userinfo + /mfa/* : 보통 rate ─────────
    location ~ ^/(token|userinfo|mfa/) {
        limit_req zone=auth_api burst=20 nodelay;
        proxy_pass http://127.0.0.1:30100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── SDK 정적 호스팅 (외부 통합용) ─────────────────
    location = /sdk/dclub-auth-client.js {
        alias /opt/dclub-auth/projects/dclub-auth/sdk/dclub-auth-client.js;
        add_header Cache-Control "public, max-age=86400";
        add_header Access-Control-Allow-Origin "*";
        types { } default_type application/javascript;
    }

    # ── /health: 모니터링 ─────────────────────────────
    location = /health {
        proxy_pass http://127.0.0.1:30100;
        proxy_read_timeout 5s;
        access_log off;   # 헬스체크 로그 노이즈 제거
    }

    # ── 그 외 모든 경로 (authorize/signup/forgot 등) ───
    location / {
        proxy_pass http://127.0.0.1:30100;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }

    # 로그
    access_log /var/log/nginx/auth.dclub.kr.access.log;
    error_log  /var/log/nginx/auth.dclub.kr.error.log;
}
